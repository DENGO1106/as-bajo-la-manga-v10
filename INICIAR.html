    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            overflow-x: hidden;
            overscroll-behavior-y: contain;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        html {
            height: 100%;
            overflow: hidden;
        }

        #game-container {
            flex-grow: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 2rem;
        }

        .glass {
            background: rgba(15, 23, 42, 0.7);
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.1);
        }

        .gold-border {
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .card-shadow {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.7), 0 10px 10px -5px rgba(0, 0, 0, 0.5);
        }

        .gold-text {
            color: #D4AF37;
        }

        .gradient-gold {
            background: linear-gradient(135deg, #FFD700 0%, #D4AF37 50%, #B8860B 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bg-gold {
            background: linear-gradient(135deg, #FFD700 0%, #D4AF37 100%);
        }

        .btn-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-hover:active {
            transform: scale(0.95);
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        .card-enter {
            animation: cardEnter 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes cardEnter {
            0% {
                opacity: 0;
                transform: rotateY(-10deg) scale(0.9) translateY(20px);
            }

            100% {
                opacity: 1;
                transform: rotateY(0) scale(1) translateY(0);
            }
        }

        /* Advanced Interactive Animations */
        @keyframes cardFlip {
            0% {
                transform: perspective(1000px) rotateY(0deg);
            }

            50% {
                transform: perspective(1000px) rotateY(90deg);
                opacity: 0.5;
            }

            100% {
                transform: perspective(1000px) rotateY(0deg);
            }
        }

        .card-flip {
            animation: cardFlip 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            10%,
            30%,
            50%,
            70%,
            90% {
                transform: translateX(-4px);
            }

            20%,
            40%,
            60%,
            80% {
                transform: translateX(4px);
            }
        }

        .shake {
            animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97);
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-100%);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100%);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .slide-in-left {
            animation: slideInLeft 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .slide-in-right {
            animation: slideInRight 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Ripple Effect */
        .ripple {
            position: relative;
            overflow: hidden;
        }

        .ripple::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .ripple:active::after {
            width: 300px;
            height: 300px;
        }

        /* Pulse Animation */
        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.05);
                opacity: 0.8;
            }
        }

        .pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        /* Glow Effect */
        @keyframes glow {

            0%,
            100% {
                box-shadow: 0 0 5px rgba(212, 175, 55, 0.3);
            }

            50% {
                box-shadow: 0 0 20px rgba(212, 175, 55, 0.6), 0 0 30px rgba(212, 175, 55, 0.4);
            }
        }

        .glow {
            animation: glow 2s ease-in-out infinite;
        }

        /* Touch Feedback */
        .touch-feedback {
            position: relative;
            transform: scale(1);
            transition: transform 0.1s ease;
        }

        .touch-feedback:active {
            transform: scale(0.97);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #D4AF37;
            border-radius: 10px;
        }

        .tab-active {
            border-bottom: 3px solid #D4AF37;
            color: #D4AF37;
            transition: all 0.3s ease;
        }

        /* Swipe Indicator */
        .swipe-indicator {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
            pointer-events: none;
            z-index: 40;
        }

        /* Mobile Optimizations */
        @media (max-width: 768px) {

            /* Ensure minimum touch target size */
            button,
            a,
            input[type="button"] {
                min-height: 44px;
                min-width: 44px;
            }

            /* Better thumb reach zones */
            .btn-hover {
                padding: 1rem !important;
            }

            /* Optimize typography for small screens */
            h1 {
                font-size: clamp(1.25rem, 5vw, 2rem);
            }

            h2 {
                font-size: clamp(1rem, 4vw, 1.5rem);
            }

            h3 {
                font-size: clamp(0.875rem, 3.5vw, 1.25rem);
            }

            p,
            span {
                font-size: clamp(0.75rem, 3vw, 1rem);
            }

            /* Improve card sizing on small screens */
            .glass.rounded-\[2\.5rem\] {
                min-height: 350px !important;
            }

            /* Better spacing for mobile */
            .space-y-4>*+* {
                margin-top: 1.2rem;
            }

            .space-y-8>*+* {
                margin-top: 2rem;
            }
        }

        /* Landscape mobile optimization */
        @media (max-height: 500px) and (orientation: landscape) {

            .min-h-\[60vh\],
            .min-h-\[400px\] {
                min-height: 280px !important;
            }

            .space-y-8>*+* {
                margin-top: 1rem;
            }
        }

        /* Prevent text selection during gestures */
        .no-select {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }


        /* SUPABASE REALTIME CSS */
        .pulse-border { animation: pulseBorder 2s infinite; }
        @keyframes pulseBorder {
            0% { border-color: rgba(245,158,11,0.2); }
            50% { border-color: rgba(245,158,11,0.8); }
            100% { border-color: rgba(245,158,11,0.2); }
        }
        .room-code-display {
            font-family: monospace;
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 0.2em;
            color: #fbbf24;
            text-shadow: 0 0 20px rgba(245,158,11,0.4);
        }
        /* Prevent pull-to-refresh on mobile browsers */
        body {
            overscroll-behavior-y: contain;
        }
    </style>
</head>

e: "Declaración Pública", text: 'Ve a la calle o a otra habitación y grita: "¡Soy un genio de las matemáticas!".', drink: "2 Tragos" }, { id: 37, cat: "RETO EXPRESS", title: "El Equilibrista", text: "Párate en una sola pierna y cuenta hasta 20 en voz alta. Si te caes, bebes.", drink: "1 Trago" }, { id: 38, cat: "RETO EXPRESS", title: "Mensaje al Ex", text: 'Envía un mensaje de texto a tu ex (o a la última persona que saliste) diciendo: "Hoy tengo sueños húmedos contigo". ¡Muéstralo!', drink: "3 Tragos" }, { id: 39, cat: "RETO EXPRESS", title: "Stand-Up de 10 Segundos", text: "Haz un chiste o imita a un famoso durante 10 segundos. Si nadie se ríe, bebes 3.", drink: "3 Tragos" }, { id: 40, cat: "RETO EXPRESS", title: "La Estatua", text: "Permanece inmóvil y en silencio con los brazos en alto hasta que alguien te haga una pregunta.", drink: "2 Tragos si te mueves o hablas" }, { id: 41, cat: "RETO EXPRESS", title: "El Robot", text: 'Camina como un robot y di "¡Exterminar!" al menos 5 veces mientras recorres la sala.', drink: "2 Tragos" }, { id: 42, cat: "RETO EXPRESS", title: "La Misión Imposible", text: "Pide a alguien que te preste un calcetín y póntelo en una mano como si fuera un guante. Úsalo hasta tu próximo turno.", drink: "1 Trago" }, { id: 43, cat: "RETO EXPRESS", title: "El Desafío del Hielo", text: "Coloca un cubo de hielo en tu cuello y no lo retires hasta que se derrita o tú bebas.", drink: "3 Tragos" }, { id: 44, cat: "RETO EXPRESS", title: "¡Selfie Cómica!", text: "Toma una selfie con el jugador a tu izquierda haciendo la cara más fea que puedas. Muéstrala al grupo.", drink: "2 Tragos" }, { id: 45, cat: "RETO EXPRESS", title: "El Baile de la Botella", text: "Haz un baile de 15 segundos usando una botella como micrófono.", drink: "3 Tragos si el grupo no aplaude" }, { id: 46, cat: "RETO EXPRESS", title: "El Teléfono Escondido", text: "Esconde tu teléfono en la ropa de otro jugador sin que se dé cuenta.", drink: "2 Tragos si te descubren" }, { id: 47, cat: "RETO EXPRESS", title: "Lengua de Vaca", text: "Lame tres objetos distintos de la mesa (¡limpios!) y describe su sabor.", drink: "3 Tragos si te niegas" }, { id: 48, cat: "RETO EXPRESS", title: "El Imitador", text: "Imita al anfitrión/dueño de la casa (o al jugador a tu derecha) durante 1 minuto.", drink: "2 Tragos si nadie reconoce la imitación" }, { id: 49, cat: "RETO EXPRESS", title: "El Grito de Guerra", text: "Inventa un grito de guerra para el grupo y haz que todos lo repitan 3 veces.", drink: "1 Trago si te lo repiten mal" }, { id: 50, cat: "RETO EXPRESS", title: "El Vendedor", text: "Intenta venderle un objeto común de la sala (ej. un cojín) a otro jugador usando solo 3 adjetivos.", drink: '3 Tragos si nadie lo "compra"' }, { id: 51, cat: "RETO EXPRESS", title: "¡5 Lagartijas!", text: "Haz 5 lagartijas (flexiones) o el grupo te asigna 3 tragos.", drink: "3 Tragos si no haces las lagartijas" }, { id: 52, cat: "RETO EXPRESS", title: "El Abrazo Inesperado", text: "Abraza fuertemente al jugador que menos esperas que lo haga.", drink: "1 Trago" }, { id: 53, cat: "RETO EXPRESS", title: "El Cantante de Ópera", text: "Canta una frase de una canción con voz de ópera.", drink: "2 Tragos si el grupo no adivina la canción" }, { id: 54, cat: "RETO EXPRESS", title: "El Desfile de Modas", text: "Desfila como modelo hasta la cocina y de vuelta.", drink: "2 Tragos" }, { id: 55, cat: "RETO EXPRESS", title: "El Tatuaje Falso", text: "Dibuja un tatuaje temporal con bolígrafo en el rostro de otro jugador.", drink: "3 Tragos si el jugador se niega" }, { id: 56, cat: "RETO EXPRESS", title: "El Cambio de Voz", text: "Habla con un acento extranjero (inglés, francés, etc.) hasta tu próximo turno.", drink: "1 Trago si olvidas el acento" }, { id: 57, cat: "RETO EXPRESS", title: "El Cónclave", text: "Todos pongan las manos en el centro de la mesa. El último en retirar la mano, bebe.", drink: "2 Tragos" }, { id: 58, cat: "RETO EXPRESS", title: "El Equilibrio del Teléfono", text: "Equilibra tu teléfono en tu frente durante 15 segundos sin usar las manos.", drink: "3 Tragos si se cae" }, { id: 59, cat: "RETO EXPRESS", title: "Pide Perdón", text: "Llama a alguien de tu familia (o amigo) y discúlpate por algo que no has hecho.", drink: "3 Tragos" }, { id: 60, cat: "RETO EXPRESS", title: "El Escondite", text: "Escóndete en la sala por 30 segundos sin que te encuentren.", drink: "2 Tragos si te encuentran" }, { id: 61, cat: "REGLA DE ORO", title: "La Mano Prohibida", text: "REGLA: No se permite señalar nada o a nadie con el dedo. Debes señalar con el codo.", drink: "1 Trago por cada vez que se señale con el dedo" }, { id: 62, cat: "REGLA DE ORO", title: "El Titán", text: 'REGLA: Cada vez que bebas, debes decir "¡Por la gloría del Tótem!".', drink: "1 Trago cada vez que se olvide la frase" }, { id: 63, cat: "REGLA DE ORO", title: "El Lenguaje Inclusivo", text: 'REGLA: Cada vez que uses la palabra "yo", debes agregar "el magnifico/a".', drink: "1 Trago por olvidar el adjetivo" }, { id: 64, cat: "REGLA DE ORO", title: "Sin Nombres", text: "REGLA: Está prohibido llamar a cualquier jugador por su nombre. Se deben usar solo apodos.", drink: "1 Trago por cada nombre propio" }, { id: 65, cat: "REGLA DE ORO", title: "El Guardián de la Copa", text: "REGLA: Tu vaso siempre debe estar en tu mano izquierda (o derecha, si eres zurdo). Si está en la mesa, bebes.", drink: "2 Tragos" }, { id: 66, cat: "REGLA DE ORO", title: "La Reverencia", text: "REGLA: Cada vez que un jugador se levante de su asiento o vuelva a él, debe hacer una pequeña reverencia.", drink: "1 Trago por olvidarlo" }, { id: 67, cat: "REGLA DE ORO", title: "Palabras Prohibidas", text: 'REGLA: La palabra "Sí" y "No" están prohibidas. Debes usar "Afirmativo" o "Negativo" en su lugar.', drink: '1 Trago por usar "Sí" o "No"' }, { id: 68, cat: "REGLA DE ORO", title: "El Eco", text: "REGLA: La última palabra de cada frase que digas debe ser repetida inmediatamente por el jugador a tu derecha.", drink: "1 Trago si olvidas la repetición" }, { id: 69, cat: "REGLA DE ORO", title: "El Gesto", text: "REGLA: Antes de beber cualquier cosa, debes tocarte la punta de la nariz.", drink: "1 Trago" }, { id: 70, cat: "REGLA DE ORO", title: "Sin Menciones", text: "REGLA: Está prohibido hablar de trabajo o estudios. El tema es completamente tabú.", drink: "3 Tragos" }, { id: 71, cat: "REGLA DE ORO", title: "El Vaso Cambiante", text: "REGLA: Todos deben mover su vaso un asiento a la derecha después de beber.", drink: "2 Tragos si bebes de tu vaso original" }, { id: 72, cat: "REGLA DE ORO", title: "La Mímica", text: "REGLA: Antes de hablar, debes hacer un gesto de mímica relacionado con el tema de conversación.", drink: "1 Trago si olvidas el gesto" }, { id: 73, cat: "REGLA DE ORO", title: "El Pirata", text: "REGLA: Todos deben mantener un ojo cerrado hasta que la regla sea anulada.", drink: "2 Tragos si abres los dos ojos" }, { id: 74, cat: "REGLA DE ORO", title: "La Risa Prohibida", text: "REGLA: Está prohibido reír. Solo se permite sonreír o gruñir.", drink: "3 Tragos si te ríes" }, { id: 75, cat: "REGLA DE ORO", title: "El Cantante", text: "REGLA: La última palabra de cada frase debe ser cantada.", drink: "1 Trago si no cantas la última palabra" }, { id: 76, cat: "REGLA DE ORO", title: "La Persona Especial", text: 'REGLA: Debes referirte al jugador a tu izquierda solo como "Mi Amor".', drink: "1 Trago si usas su nombre o un pronombre diferente" }, { id: 77, cat: "REGLA DE ORO", title: "El Tonto de la Mesa", text: "REGLA: El jugador que sacó esta carta debe beber 1 trago extra cada vez que alguien le dé a beber.", drink: "3 Tragos máx. en total" }, { id: 78, cat: "REGLA DE ORO", title: "El Silencio Absoluto", text: 'REGLA: Está prohibido usar la palabra "silencio", "callar" o cualquier sinónimo.', drink: "1 Trago si usas las palabras prohibidas" }, { id: 79, cat: "REGLA DE ORO", title: "La Prenda de Cabeza", text: "REGLA: Todos deben llevar una prenda de ropa en la cabeza (ej. un calcetín, pañuelo).", drink: "2 Tragos si te la quitas" }, { id: 80, cat: "REGLA DE ORO", title: "El Agradecimiento", text: 'REGLA: Cada vez que alguien te pase algo, debes decir "Muchas gracias, buen amigo".', drink: "1 Trago si olvidas agradecer" }, { id: 81, cat: "REGLA DE ORO", title: "El Cambio de Género", text: "REGLA: Debes referirte a todos los jugadores usando el género opuesto al real (él/ella).", drink: "2 Tragos si te equivocas" }, { id: 82, cat: "REGLA DE ORO", title: "El Teléfono de la Mesa", text: "REGLA: Todos los teléfonos deben estar boca abajo y apilados en el centro. El primero en tocar el teléfono, bebe 3.", drink: "3 Tragos si lo tocas" }, { id: 83, cat: "REGLA DE ORO", title: "El Toque de Rodilla", text: "REGLA: Tu rodilla debe estar tocando la rodilla de otro jugador en todo momento.", drink: "2 Tragos si rompes el contacto" }, { id: 84, cat: "REGLA DE ORO", title: "La Palmada", text: "REGLA: Después de cada turno, el jugador a la derecha debe darle una palmada en la espalda al jugador que acaba de jugar.", drink: "1 Trago si olvidas la palmada" }, { id: 85, cat: "REGLA DE ORO", title: "El Idioma Secreto", text: 'REGLA: Debes terminar cada frase con la palabra "Miau".', drink: '1 Trago si olvidas el "Miau"' }, { id: 86, cat: "REGLA DE ORO", title: "Sin Apoyar", text: "REGLA: Está prohibido apoyar la espalda en la silla o sofá.", drink: "2 Tragos si te apoyas" }, { id: 87, cat: "REGLA DE ORO", title: "El Color Peligroso", text: "REGLA: Está prohibido mencionar el color que lleva la persona a tu izquierda.", drink: "3 Tragos si mencionas el color" }, { id: 88, cat: "REGLA DE ORO", title: "La Voz Alta", text: "REGLA: El jugador que sacó la carta debe hablar el resto de la ronda en voz muy alta.", drink: "1 Trago si hablas bajo" }, { id: 89, cat: "REGLA DE ORO", title: "El Poeta", text: "REGLA: Cada frase debe rimar con la anterior.", drink: "2 Tragos si no rima" }, { id: 90, cat: "REGLA DE ORO", title: "La Afirmación", text: 'REGLA: Cada vez que hables, debes empezar tu frase con la palabra "Claramente...".', drink: "1 Trago si olvidas el inicio" }, { id: 91, cat: "DUELO 1 VS 1", title: "Carrera de Dedos", text: "Elige un oponente. Ambos colocan un dedo índice en la mesa. El primero en mover el suyo, bebe.", drink: "Perdedor bebe 2 Tragos" }, { id: 92, cat: "DUELO 1 VS 1", title: "El Espejo", text: "Elige un oponente. Uno hace un gesto, el otro debe imitarlo a la perfección. El grupo vota quién lo hizo mejor.", drink: "Perdedor bebe 3 Tragos" }, { id: 93, cat: "DUELO 1 VS 1", title: "Adivina la Canción", text: "Elige un oponente. Tararea una canción. Si el oponente la adivina antes de 10 segundos, tú bebes. Si no, él bebe.", drink: "Ganador asigna 2 Tragos, perdedor bebe 2" }, { id: 94, cat: "DUELO 1 VS 1", title: "Suma Rápida", text: "Elige un oponente. Digan números del 1 al 10. El primero en decir el número que hace que la suma total llegue a 50, pierde.", drink: "Perdedor bebe 1 Trago" }, { id: 95, cat: "DUELO 1 VS 1", title: "El Viento", text: "Elige un oponente. Ambos soplan una carta/servilleta sobre la mesa. El que logre moverla la mayor distancia, gana.", drink: "Perdedor bebe 2 Tragos" }, { id: 96, cat: "DUELO 1 VS 1", title: "El Desafío de la Cuchara", text: "Elige un oponente. Con una cuchara en la boca, deben tocar las cucharas sin tocarse la cara. El primero en tocar, gana.", drink: "Perdedor bebe 3 Tragos" }, { id: 97, cat: "DUELO 1 VS 1", title: "El Mentiroso", text: "Elige un oponente. Ambos cuentan una anécdota (una verdadera y una falsa). El que adivina mal, bebe.", drink: "Cada uno bebe 2 Tragos si adivinan mal" }, { id: 98, cat: "DUELO 1 VS 1", title: "Piedra, Papel, Codo", text: "Juega Piedra, Papel o Tijera contra la persona a tu derecha. Al mejor de tres.", drink: "Perdedor bebe 2 Tragos" }, { id: 99, cat: "DUELO 1 VS 1", title: "¿Qué Prefieres?", text: 'Elige un oponente. Pregúntale un "Qué Prefieres" incómodo. Si duda más de 5 segundos en responder, bebe.', drink: "Si duda, bebe 1 Trago" }, { id: 100, cat: "DUELO 1 VS 1", title: "Traba Lenguas", text: "Elige un oponente. Ambos deben decir el trabalenguas 3 veces sin equivocarse.", drink: "El primero en equivocarse bebe 2 Tragos" }, { id: 101, cat: "DUELO 1 VS 1", title: "La Mirada Fija", text: "Elige un oponente. Míralo a los ojos fijamente. El primero en parpadear o reír, pierde.", drink: "Perdedor bebe 2 Tragos" }, { id: 102, cat: "DUELO 1 VS 1", title: "Las 5 Palabras", text: 'Elige un oponente. Cada uno debe decir 5 palabras que rimen con "corazón". El primero en repetir o fallar, pierde.', drink: "Perdedor bebe 3 Tragos" }, { id: 103, cat: "DUELO 1 VS 1", title: "El Conteo Inverso", text: "Elige un oponente. Cuenten del 10 al 1. El primero en dudar o equivocarse, pierde.", drink: "Perdedor bebe 1 Trago" }, { id: 104, cat: "DUELO 1 VS 1", title: "Guerra de Pulgares", text: "Elige un oponente para una guerra de pulgares. El perdedor bebe.", drink: "Perdedor bebe 2 Tragos" }, { id: 105, cat: "DUELO 1 VS 1", title: "El Lápiz Equilibrista", text: "Elige un oponente. Equilibren un lápiz en un dedo por 10 segundos. El que lo deje caer, pierde.", drink: "Perdedor bebe 3 Tragos" }, { id: 106, cat: "DUELO 1 VS 1", title: "El Desafío de la Moneda", text: "Elige un oponente. Tira una moneda. El oponente adivina cara o cruz. Si falla, bebe.", drink: "Oponente bebe 2 Tragos" }, { id: 107, cat: "DUELO 1 VS 1", title: "Pregunta Imposible", text: "Elige un oponente. Hazle una pregunta de trivia. Si no sabe, bebe.", drink: "Oponente bebe 2 Tragos" }, { id: 108, cat: "DUELO 1 VS 1", title: "Batalla de Baile", text: "Elige un oponente. Tienen 10 segundos para hacer un paso de baile épico. El grupo vota.", drink: "Perdedor bebe 3 Tragos" }, { id: 109, cat: "DUELO 1 VS 1", title: "La Imitación Rápida", text: "Elige un oponente. Uno hace un sonido de animal. El otro debe repetirlo. El que falle la repetición, pierde.", drink: "Perdedor bebe 2 Tragos" }, { id: 110, cat: "DUELO 1 VS 1", title: "Cita de Película", text: "Elige un oponente. Uno dice una cita de película. El oponente debe decir de qué película es en 5 segundos.", drink: "Perdedor bebe 1 Trago" }, { id: 111, cat: "DUELO 1 VS 1", title: "Palabras Encadenadas", text: "Elige un oponente. Digan una palabra alternativamente. El primero en repetir o tardar más de 3 segundos, pierde.", drink: "Perdedor bebe 2 Tragos" }, { id: 112, cat: "DUELO 1 VS 1", title: "El Reto de la Pila", text: "Elige un oponente. Apilen 5 monedas/cartas una encima de la otra. El primero en hacer que la pila caiga, pierde.", drink: "Perdedor bebe 3 Tragos" }, { id: 113, cat: "DUELO 1 VS 1", title: "La Verdad o Trago", text: "Elige un oponente. Tú le haces una pregunta de Verdad Incómoda. Si se niega a responder, debe beber el doble (2x3).", drink: "Si se niega, bebe 3 Tragos" }, { id: 114, cat: "DUELO 1 VS 1", title: "El Minuto de Silencio", text: "Elige un oponente. Ambos deben permanecer en silencio absoluto durante 60 segundos. El que hable o haga ruido, pierde.", drink: "Perdedor bebe 3 Tragos" }, { id: 115, cat: "DUELO 1 VS 1", title: "La Piedra de la Suerte", text: "Elige a un oponente. Ambos lanzan una moneda. Si sale lo mismo, el que sacó la carta bebe. Si sale diferente, el oponente bebe.", drink: "El que beba, 2 Tragos" }, { id: 116, cat: "DUELO 1 VS 1", title: "Batalla de Títulos", text: "Elige un oponente. Nombren películas que empiecen con la letra 'A' de forma alternada.", drink: "Perdedor bebe 2 Tragos" }, { id: 117, cat: "DUELO 1 VS 1", title: "La Estatua Humana", text: "Elige un oponente. Ambos hacen una pose incómoda. El primero en moverse o reír, pierde.", drink: "Perdedor bebe 3 Tragos" }, { id: 118, cat: "DUELO 1 VS 1", title: "El Cuento de 3 Palabras", text: "Elige un oponente. Cuenten una historia alternando 3 palabras cada uno. El que rompa el flujo o se quede sin ideas, pierde.", drink: "Perdedor bebe 2 Tragos" }, { id: 119, cat: "DUELO 1 VS 1", title: "El Desafío del Nombre", text: "Elige un oponente. Tienen 10 segundos para escribir 10 nombres de personas que empiecen con 'M'. El que menos tenga, pierde.", drink: "Perdedor bebe 3 Tragos" }, { id: 120, cat: "DUELO 1 VS 1", title: "La Tómbola", text: "Elige a un oponente. Tú le asignas 3 tragos si no me convences de que le pases el castigo a otro jugador.", drink: "Oponente bebe 3 Tragos si no le convences" }, { id: 121, cat: "CASTIGO INSTANTÁNEO", title: "¡Cascada!", text: "Todos beben en cascada. El que sacó la carta empieza.", drink: "El último en parar bebe 2 Tragos extra" }, { id: 122, cat: "CASTIGO INSTANTÁNEO", title: "El Cumpleaños", text: "El jugador más joven del grupo bebe 3 tragos.", drink: "El jugador más joven bebe 3 Tragos" }, { id: 123, cat: "CASTIGO INSTANTÁNEO", title: "El Tótem Indeciso", text: "El jugador que sacó la carta debe beber 2 tragos por su mala suerte.", drink: "Jugador bebe 2 Tragos" }, { id: 124, cat: "CASTIGO INSTANTÁNEO", title: "¡A beber en pareja!", text: "Elige a la persona que más se parece a ti en el grupo. Ambos beben 2 tragos.", drink: "Ambos beben 2 Tragos" }, { id: 125, cat: "CASTIGO INSTANTÁNEO", title: "¡Los de Jeans!", text: "Todos los que estén usando pantalones de mezclilla (jeans) deben beber 1 trago.", drink: "Todos los de jeans beben 1 Trago" }, { id: 126, cat: "CASTIGO INSTANTÁNEO", title: "El Desastre", text: "Asigna 3 tragos a la persona que ha derramado algo últimamente.", drink: "Asigna 3 Tragos" }, { id: 127, cat: "CASTIGO INSTANTÁNEO", title: "¡Mala Suerte!", text: "Has sacado el peor castigo: ¡Todos beben 1 trago!", drink: "Todos beben 1 Trago" }, { id: 128, cat: "CASTIGO INSTANTÁNEO", title: "El Dueño de la Fiesta", text: "La persona que organizó la fiesta o es dueña de la casa bebe 3 tragos.", drink: "El anfitrión bebe 3 Tragos" }, { id: 129, cat: "CASTIGO INSTANTÁNEO", title: "El Grito Silencioso", text: "El jugador que sacó la carta debe beber 1 trago y no puede hablar hasta que 3 personas le hablen directamente.", drink: "Jugador bebe 1 Trago" }, { id: 130, cat: "CASTIGO INSTANTÁNEO", title: "El Último que Hable", text: "Cállense todos inmediatamente. El último que haya hablado antes de este anuncio, bebe 3 tragos.", drink: "Último en hablar bebe 3 Tragos" }, { id: 131, cat: "CASTIGO INSTANTÁNEO", title: "El Teléfono a la Vista", text: "Todos los que tengan el teléfono en la mano o sobre la mesa deben beber 2 tragos.", drink: "Bebe 2 Tragos" }, { id: 132, cat: "CASTIGO INSTANTÁNEO", title: "La Camisa de Botones", text: "Todos los que lleven una camisa con botones deben beber 1 trago.", drink: "Bebe 1 Trago" }, { id: 133, cat: "CASTIGO INSTANTÁNEO", title: "El Beber por la Izquierda", text: "El jugador a tu izquierda bebe 3 tragos.", drink: "Jugador de la izquierda bebe 3 Tragos" }, { id: 134, cat: "CASTIGO INSTANTÁNEO", title: "La Persona más Lejana", text: "Asigna 3 tragos a la persona que esté físicamente más lejos de ti.", drink: "Asigna 3 Tragos" }, { id: 135, cat: "CASTIGO INSTANTÁNEO", title: "El Color de la Suerte", text: "Elige un color. Todos los que lleven algo de ese color deben beber 2 tragos.", drink: "Bebe 2 Tragos" }, { id: 136, cat: "CASTIGO INSTANTÁNEO", title: "El Viajero", text: "Todos los que hayan viajado fuera del país en el último año beben 2 tragos.", drink: "Bebe 2 Tragos" }, { id: 137, cat: "CASTIGO INSTANTÁNEO", title: "¡Asignación Doble!", text: "El jugador que sacó la carta asigna 3 tragos a 2 personas distintas.", drink: "Asigna 3 Tragos a 2 personas" }, { id: 138, cat: "CASTIGO INSTANTÁNEO", title: "El Gato/Perro", text: "Todos los que tengan un gato o un perro (o ambos) beben 1 trago.", drink: "Bebe 1 Trago" }, { id: 139, cat: "CASTIGO INSTANTÁNEO", title: "Los Solteros", text: "Todos los solteros o los que no tengan pareja actualmente beben 3 tragos.", drink: "Bebe 3 Tragos" }, { id: 140, cat: "CASTIGO INSTANTÁNEO", title: "Los Calcetines de Colores", text: "Todos los que no lleven calcetines blancos o negros deben beber 2 tragos.", drink: "Bebe 2 Tragos" }, { id: 141, cat: "CASTIGO INSTANTÁNEO", title: "Los Gafas", text: "Todos los que lleven gafas de sol o de ver deben beber 2 tragos.", drink: "Bebe 2 Tragos" }, { id: 142, cat: "CASTIGO INSTANTÁNEO", title: "El Más Alto", text: "El jugador más alto de la mesa bebe 3 tragos.", drink: "El jugador más alto bebe 3 Tragos" }, { id: 143, cat: "CASTIGO INSTANTÁNEO", title: "El Bebedor de la Derecha", text: "El jugador a tu derecha debe beber el doble de tu castigo (máx. 3).", drink: "Jugador de la derecha bebe 3 Tragos" }, { id: 144, cat: "CASTIGO INSTANTÁNEO", title: "El Que Tose", text: "El último jugador que haya tosido o estornudado bebe 3 tragos.", drink: "Bebe 3 Tragos" }, { id: 145, cat: "CASTIGO INSTANTÁNEO", title: "Las Uñas Pintadas", text: "Todos los que tengan las uñas pintadas (manos o pies) deben beber 1 trago.", drink: "Bebe 1 Trago" }, { id: 146, cat: "CASTIGO INSTANTÁNEO", title: "El Desconocido", text: "El jugador que sacó la carta bebe 1 trago. Luego, le asigna 2 tragos a alguien que no conoce bien.", drink: "Jugador bebe 1, Asigna 2" }, { id: 147, cat: "CASTIGO INSTANTÁNEO", title: "El Castigo al Lado", text: "El jugador que sacó la carta bebe 1 trago, y el de su derecha bebe 2.", drink: "Jugador bebe 1, derecha bebe 2" }, { id: 148, cat: "CASTIGO INSTANTÁNEO", title: "El Fanático", text: "Todos los que tengan una mascota o sean dueños de un vehículo (coche o moto) beben 2 tragos.", drink: "Bebe 2 Tragos" }, { id: 149, cat: "CASTIGO INSTANTÁNEO", title: "La Traición", text: "Di una razón por la que el jugador que tienes enfrente ha traicionado alguna amistad tuya.", drink: "Ambos beben 3 tragos" }, { id: 150, cat: "CASTIGO INSTANTÁNEO", title: "El Último en Tocar el Suelo", text: "Pongan un pie sobre la silla. El último en volver a tocar el suelo con los dos pies, bebe 3 tragos.", drink: "Bebe 3 Tragos" }, { id: 151, cat: "MISIÓN SECRETA", title: "El Cambio de Nombre", text: 'Haz que 2 jugadores te llamen por un apodo inventado por ti (ej. "Capitán") antes de 3 turnos.', drink: "Si te descubren, bebes 3 Tragos" }, { id: 152, cat: "MISIÓN SECRETA", title: "El Toque Frío", text: "Toca discretamente el cuello de otro jugador con algo muy frío.", drink: "Si te descubren, bebes 2 Tragos" }, { id: 153, cat: "MISIÓN SECRETA", title: "La Aprobación", text: "Logra que el jugador a tu izquierda asienta con la cabeza 3 veces sin hacerle una pregunta directa.", drink: "Si te descubren, bebes 3 Tragos" }, { id: 154, cat: "MISIÓN SECRETA", title: "El Teléfono Falso", text: "Finge recibir una llamada de alguien famoso y mantén una conversación creíble durante 30 segundos.", drink: "Si alguien te pregunte si es real, bebes 3 Tragos" }, { id: 155, cat: "MISIÓN SECRETA", title: "Objeto Escondido", text: "Esconde un objeto pequeño del área de juego sin que nadie lo note.", drink: "Si te descubren, bebes 2 Tragos" }, { id: 156, cat: "MISIÓN SECRETA", title: "El Piropo", text: "Haz un cumplido muy específico sobre la ropa o aspecto físico del jugador de enfrente sin que suene sarcástico.", drink: "Si te descubren, bebes 3 Tragos" }, { id: 157, cat: "MISIÓN SECRETA", title: "Cambio de Asiento", text: "Termina la ronda sentado en un asiento diferente al que empezaste.", drink: "Si te descubren, bebes 1 Trago" }, { id: 158, cat: "MISIÓN SECRETA", title: "El Poema Oculto", text: "Usa al menos 5 palabras que rimen entre sí en una sola frase sin que te lo cuestionen.", drink: "Si te descubren, bebes 3 Tragos" }, { id: 159, cat: "MISIÓN SECRETA", title: "El Fiel Amigo", text: "Consigue que otro jugador te dé su bebida para que la sostengas durante el resto de la ronda.", drink: "Si te descubren, bebes 2 Tragos" }, { id: 160, cat: "MISIÓN SECRETA", title: "El Brindis", text: 'Propón un brindis "por la amistad" antes de que tu turno vuelva a empezar.', drink: "Si no lo logras, bebes 2 Tragos" }, { id: 161, cat: "MISIÓN SECRETA", title: "El Camarero", text: 'Pídele a 3 personas si quieren "más de su bebida" sin que sospechen que es un reto.', drink: "Si te descubren, bebes 3 Tragos" }, { id: 162, cat: "MISIÓN SECRETA", title: "El Anfitrión", text: "Coloca un cojín o almohada bajo el trasero de un jugador sin que se dé cuenta.", drink: "Si te descubren, bebes 3 Tragos" }, { id: 163, cat: "MISIÓN SECRETA", title: "La Postura Extraña", text: "Mantén una postura corporal incómoda (ej. la mano sobre la cabeza) durante toda la conversación.", drink: "Si te descubren, bebes 2 Tragos" }, { id: 164, cat: "MISIÓN SECRETA", title: "El Famoso", text: "Di una frase célebre de un personaje de ficción o real como si fuera tuya.", drink: "Si alguien pregunta por el origen, bebes 3 Tragos" }, { id: 165, cat: "MISIÓN SECRETA", title: "La Conversación Falsa", text: "Inventa una excusa para que un jugador cambie de asiento.", drink: "Si te descubren, bebes 1 Trago" }, { id: 166, cat: "MISIÓN SECRETA", title: "El Error de Palabra", text: 'Usa una palabra incorrecta (ej. "ordenador" en vez de "móvil") al menos 5 veces.', drink: "Si te descubren, bebes 2 Tragos" }, { id: 167, cat: "MISIÓN SECRETA", title: "El Zapato Mojado", text: "Moja discretamente la punta del zapato de un jugador con tu bebida.", drink: "Si te descubren, bebes 3 Tragos" }, { id: 168, cat: "MISIÓN SECRETA", title: "El Poema", text: "Recita un poema de 4 líneas inventado sobre el jugador a tu derecha.", drink: "Si no es un poema original, bebes 3 Tragos" }, { id: 169, cat: "MISIÓN SECRETA", title: "La Cita a Ciegas", text: "Elige a un jugador y un lugar. Intenta convencer al grupo de que irán juntos a una cita ahí.", drink: "Si te descubren, bebes 2 Tragos" }, { id: 170, cat: "MISIÓN SECRETA", title: "El Grito Oculto", text: 'Durante 5 minutos, debes emitir un pequeño grito (casi inaudible) cada vez que alguien use la palabra "pero".', drink: "Si te descubren, bebes 3 Tragos" }, { id: 171, cat: "MISIÓN SECRETA", title: "El Doble Sentido", text: "Usa una palabra con doble sentido (grosero o pícaro) 5 veces sin que nadie se dé cuenta.", drink: "Si te descubren, bebes 3 Tragos" }, { id: 172, cat: "MISIÓN SECRETA", title: "El Hipster", text: 'Usa al menos 3 palabras "cool" o en inglés (ej. vibe, aesthetic, mood) sin que te lo cuestionen.', drink: "Si te descubren, bebes 2 Tragos" }, { id: 173, cat: "MISIÓN SECRETA", title: "El Espía", text: "Intercambia discretamente de lugar dos objetos pequeños de la mesa.", drink: "Si te descubren, bebes 3 Tragos" }, { id: 174, cat: "MISIÓN SECRETA", title: "El Estornudo Falso", text: "Finge un estornudo muy ruidoso 3 veces sin que nadie te pregunte si estás bien.", drink: "Si te preguntan, bebes 2 Tragos" }, { id: 175, cat: "MISIÓN SECRETA", title: "El Tocado", text: "Toca la cabeza de 3 jugadores diferentes sin llamar la atención.", drink: "Si te descubren, bebes 3 Tragos" }, { id: 176, cat: "MISIÓN SECRETA", title: "El Deletreador", text: 'Deletrea una palabra larga (ej. "paralelepípedo") sin motivo aparente en la conversación.', drink: "Si te lo cuestionan, bebes 2 Tragos" }, { id: 177, cat: "MISIÓN SECRETA", title: "El Filósofo", text: "Di un refrán o frase de sabiduría popular en medio de una conversación inapropiada.", drink: "Si no lo logras, bebes 3 Tragos" }, { id: 178, cat: "MISIÓN SECRETA", title: "El Doblaje", text: "Repite la última frase que dijo la persona a tu derecha con un tono dramático.", drink: "Si te lo cuestionan, bebes 1 Trago" }, { id: 179, cat: "MISIÓN SECRETA", title: "La Confusión", text: "Confunde intencionalmente el nombre de una persona con el de otra.", drink: "Si te lo corrigen, bebes 3 Tragos" }, { id: 180, cat: "MISIÓN SECRETA", title: "El Desinterés", text: "Durante una conversación, mira fijamente a un punto en la pared por 30 segundos.", drink: "Si te lo cuestionan, bebes 2 Tragos" }, { id: 181, cat: "COMODÍN", title: "El Protector", text: 'GUARDA ESTA CARTA. Puedes anular cualquier castigo de "3 Tragos" que se te asigne.', drink: "N/A (Se guarda)" }, { id: 182, cat: "COMODÍN", title: "Intercambio de Suerte", text: "GUARDA ESTA CARTA. Cuando un jugador reciba un castigo de 3 tragos, puedes activarla para intercambiar roles y castigos.", drink: "N/A (Se guarda)" }, { id: 183, cat: "COMODÍN", title: "Inmunidad de Regla", text: 'GUARDA ESTA CARTA. Te da inmunidad ante cualquier "Regla de Oro" activa hasta que salga la siguiente carta.', drink: "N/A (Se guarda)" }, { id: 184, cat: "COMODÍN", title: "Dedo en la Cabeza", text: 'GUARDA ESTA CARTA. En cualquier momento, puedes decir "Dedo en la Cabeza". El último en poner el dedo en su cabeza bebe 3 tragos.', drink: "N/A (Se guarda)" }, { id: 185, cat: "COMODÍN", title: "Asignación Doble", text: "GUARDA ESTA CARTA. Puedes usarla para que la persona que te castiga duplique su propio castigo.", drink: "N/A (Se guarda)" }, { id: 186, cat: "COMODÍN", title: "La Ley de Murphy", text: "GUARDA ESTA CARTA. El jugador a tu izquierda recibe inmediatamente el castigo de la carta que acaba de sacar y tú sacas una nueva.", drink: "N/A (Se guarda)" }, { id: 187, cat: "COMODÍN", title: "El Silencio de la Tumba", text: "GUARDA ESTA CARTA. Puedes usarla para silenciar a un jugador por 2 turnos. Si habla, bebe 2 tragos.", drink: "N/A (Se guarda)" }, { id: 188, cat: "COMODÍN", title: "Reversa de Tragos", text: "GUARDA ESTA CARTA. Si te asignan un castigo, puedes devolverle la mitad de los tragos al jugador que te los asignó.", drink: "N/A (Se guarda)" }, { id: 189, cat: "COMODÍN", title: "Límite Temporal", text: 'GUARDA ESTA CARTA. Puedes establecer un límite de 5 segundos para que otro jugador responda su "Verdad Incómoda" o beba.', drink: "N/A (Se guarda)" }, { id: 190, cat: "COMODÍN", title: "Robo de Comodín", text: 'GUARDA ESTA CARTA. Puedes robar una carta "Comodín" al azar de cualquier otro jugador que tenga una.', drink: "N/A (Se guarda)" }, { id: 191, cat: "COMODÍN", title: "El Veto", text: 'GUARDA ESTA CARTA. Puedes vetar la próxima carta "Regla de Oro" que salga.', drink: "N/A (Se guarda)" }, { id: 192, cat: "COMODÍN", title: "El Rescatador", text: "GUARDA ESTA CARTA. Puedes usarla para salvar a otro jugador de un castigo de 1 o 2 tragos.", drink: "N/A (Se guarda)" }, { id: 193, cat: "COMODÍN", title: "Trago Grupal", text: "GUARDA ESTA CARTA. Puedes activar esta carta para que todos los jugadores beban 1 trago.", drink: "N/A (Se guarda)" }, { id: 194, cat: "COMODÍN", title: "El Soplón", text: 'GUARDA ESTA CARTA. Puedes obligar a cualquier jugador a responder una "Verdad Incómoda" inventada por ti o beber 3.', drink: "N/A (Se guarda)" }, { id: 195, cat: "COMODÍN", title: "Inmunidad de Trivia", text: 'GUARDA ESTA CARTA. Te da un pase libre en la próxima carta de "Trivia Rápida" que saques.', drink: "N/A (Se guarda)" }, { id: 196, cat: "COMODÍN", title: "El Padrino", text: 'GUARDA ESTA CARTA. Asigna un jugador para que sea tu "Padrino". Cualquier castigo tuyo es reducido a la mitad si él bebe 1 trago.', drink: "N/A (Se guarda)" }, { id: 197, cat: "COMODÍN", title: "Robo de Gesto", text: 'GUARDA ESTA CARTA. Puedes robar el "Gesto" activo de la "Regla de Oro" y asignarlo a otro jugador.', drink: "N/A (Se guarda)" }, { id: 198, cat: "COMODÍN", title: "El Cambio de Categoría", text: "GUARDA ESTA CARTA. Si no te gusta la carta que sacaste, puedes tirarla y sacar una nueva de una categoría diferente.", drink: "N/A (Se guarda)" }, { id: 199, cat: "COMODÍN", title: "El Turno Extra", text: "GUARDA ESTA CARTA. Te permite sacar una segunda carta inmediatamente después de la tuya.", drink: "N/A (Se guarda)" }, { id: 200, cat: "COMODÍN", title: "El Doble o Nada", text: "GUARDA ESTA CARTA. Si te asignan 1 o 2 tragos, puedes doblarlos (máx. 3) para obtener 1 carta Comodín extra.", drink: "N/A (Se guarda)" }, { id: 201, cat: "COMODÍN", title: "¡A Prueba de Fallas!", text: "GUARDA ESTA CARTA. Cuando saques una carta de reto o trivia, puedes transferirla a la persona a tu derecha.", drink: "N/A (Se guarda)" }, { id: 202, cat: "COMODÍN", title: "El Repartidor", text: "GUARDA ESTA CARTA. Puedes asignar el castigo de la próxima carta a 2 jugadores distintos a tu elección.", drink: "N/A (Se guarda)" }, { id: 203, cat: "COMODÍN", title: "El Desvío", text: "GUARDA ESTA CARTA. Puedes desviar cualquier castigo de 1-2 tragos que se te asigne a un jugador de tu elección.", drink: "N/A (Se guarda)" }, { id: 204, cat: "COMODÍN", title: "La Reacción", text: 'GUARDA ESTA CARTA. Si te dan un "Reto Express" que te niegas a hacer, puedes asignarle 3 tragos al jugador que te lo puso.', drink: "N/A (Se guarda)" }, { id: 205, cat: "COMODÍN", title: "El Escondite", text: "GUARDA ESTA CARTA. En cualquier momento, puedes esconderte durante 1 minuto sin que nadie te moleste ni te asigne castigos.", drink: "N/A (Se guarda)" }, { id: 206, cat: "COMODÍN", title: "El Castigo de Consuelo", text: "GUARDA ESTA CARTA. Puedes usarla para recibir 1 trago en lugar de cualquier castigo de 3 tragos.", drink: "N/A (Se guarda)" }, { id: 207, cat: "COMODÍN", title: "El Protector de Regla", text: 'GUARDA ESTA CARTA. Puedes evitar que otro jugador rompa la "Regla de Oro" activa normalmente por 3 turnos.', drink: "N/A (Se guarda)" }, { id: 208, cat: "COMODÍN", title: "El Descarte", text: "GUARDA ESTA CARTA. Te permite descartar dos cartas del mazo sin que se jueguen.", drink: "N/A (Se guarda)" }, { id: 209, cat: "COMODÍN", title: "El Rey Midas", text: "GUARDA ESTA CARTA. Si ganas un Duelo 1 vs 1, puedes obligar a la persona que sacó esta carta a beber 3 tragos.", drink: "N/A (Se guarda)" }, { id: 210, cat: "COMODÍN", title: "La Ceguera Temporal", text: 'GUARDA ESTA CARTA. Obliga al jugador a tu izquierda a cerrar los ojos mientras respondes tu próxima "Verdad Incómoda".', drink: "N/A (Se guarda)" }, { id: 211, cat: "TRIVIA RÁPIDA", title: "Capital del Mundo", text: "Nombra la capital de Australia. (Respuesta: Canberra)", drink: "Bebe 2 Tragos si fallas" }, { id: 212, cat: "TRIVIA RÁPIDA", title: "Moneda Local", text: "¿Cuál es la moneda oficial de Japón? (Respuesta: Yen)", drink: "Bebe 1 Trago si fallas" }, { id: 213, cat: "TRIVIA RÁPIDA", title: "¿De Dónde Viene?", text: '¿De qué país es originario el plato "Sushi"? (Respuesta: Japón)', drink: "Bebe 1 Trago si fallas" }, { id: 214, cat: "TRIVIA RÁPIDA", title: "La Montaña Más Alta", text: "Nombra la montaña más alta del mundo. (Respuesta: Monte Everest)", drink: "Bebe 3 Tragos si fallas" }, { id: 215, cat: "TRIVIA RÁPIDA", title: "El Símbolo Químico", text: "¿Cuál es el símbolo químico del Oro? (Respuesta: Au)", drink: "Bebe 1 Trago si fallas" }, { id: 216, cat: "TRIVIA RÁPIDA", title: "El Idioma Más Hablado", text: "¿Cuál es el idioma más hablado del mundo por número de hablantes nativos? (Respuesta: Mandarín/Chino)", drink: "Bebe 2 Tragos si fallas" }, { id: 217, cat: "TRIVIA RÁPIDA", title: "Cita Célebre", text: '¿Quién dijo la famosa frase: "Solo sé que no sé nada"? (Respuesta: Sócrates)', drink: "Bebe 2 Tragos si fallas" }, { id: 218, cat: "TRIVIA RÁPIDA", title: "El Planeta Rojo", text: "¿Cuál es el planeta más cercano al Sol? (Respuesta: Mercurio)", drink: "Bebe 1 Trago si fallas" }, { id: 219, cat: "TRIVIA RÁPIDA", title: "El Océano", text: "Nombra el océano más grande del mundo. (Respuesta: Pacífico)", drink: "Bebe 1 Trago si fallas" }, { id: 220, cat: "TRIVIA RÁPIDA", title: "Saga de Película", text: "¿Cuántas películas conforman la saga original de Star Wars (Episodios IV, V, VI)? (Respuesta: 3)", drink: "Bebe 2 Tragos si fallas" }, { id: 221, cat: "TRIVIA RÁPIDA", title: "Deporte Olímpico", text: "¿Cuántos aros tiene el símbolo olímpico? (Respuesta: 5)", drink: "Bebe 1 Trago si fallas" }, { id: 222, cat: "TRIVIA RÁPIDA", title: "El Número Pi", text: "Di los primeros 4 decimales del número Pi. (Respuesta: 3.1415)", drink: "Bebe 2 Tragos si fallas" }, { id: 223, cat: "TRIVIA RÁPIDA", title: "Invento Clave", text: "¿Quién inventó la bombilla eléctrica? (Respuesta: Thomas Edison)", drink: "Bebe 3 Tragos si fallas" }, { id: 224, cat: "TRIVIA RÁPIDA", title: "La Obra de Arte", text: "¿Dónde se encuentra la Capilla Sixtina? (Respuesta: Ciudad del Vaticano)", drink: "Bebe 2 Tragos si fallas" }, { id: 225, c (Respuesta: Ludwig van Beethoven)', drink: "Bebe 3 Tragos si fallas" }, { id: 249, cat: "TRIVIA RÁPIDA", title: "De Película", text: "¿Cuál es el nombre del protagonista de la saga de Harry Potter? (Respuesta: Harry Potter)", drink: "Bebe 1 Trago si fallas" }, { id: 250, cat: "TRIVIA RÁPIDA", title: "Personaje de Cómic", text: "¿Cuál es el nombre real de Batman? (Respuesta: Bruce Wayne)", drink: "Bebe 2 Tragos si fallas" }, { id: 251, cat: "TRIVIA RÁPIDA", title: "Geografía", text: "¿Qué río pasa por El Cairo? (Respuesta: Nilo)", drink: "Bebe 3 Tragos si fallas" }, { id: 252, cat: "TRIVIA RÁPIDA", title: "Los Elementos", text: "¿Cuántos elementos químicos hay en la tabla periódica? (Respuesta: 118)", drink: "Bebe 3 Tragos si fallas" }, { id: 253, cat: "TRIVIA RÁPIDA", title: "De Película", text: '¿Quién es el director de la película "Titanic"? (Respuesta: James Cameron)', drink: "Bebe 2 Tragos si fallas" }, { id: 254, cat: "TRIVIA RÁPIDA", title: "El Invento", text: "¿Qué inventó Alexander Graham Bell? (Respuesta: Teléfono)", drink: "Bebe 1 Trago si fallas" }, { id: 255, cat: "TRIVIA RÁPIDA", title: "El Número Primo", text: "Nombra el número primo más pequeño de dos dígitos. (Respuesta: 11)", drink: "Bebe 3 Tragos si fallas" }, { id: 256, cat: "TRIVIA RÁPIDA", title: "Animales", text: "¿Cuál es el mamífero más grande del mundo? (Respuesta: Ballena Azul)", drink: "Bebe 2 Tragos si fallas" }, { id: 257, cat: "TRIVIA RÁPIDA", title: "Música", text: "Nombra el género musical asociado a Bob Marley. (Respuesta: Reggae)", drink: "Bebe 1 Trago si fallas" }, { id: 258, cat: "TRIVIA RÁPIDA", title: "La Historia", text: "¿Quién fue el primer presidente de Estados Unidos? (Respuesta: George Washington)", drink: "Bebe 3 Tragos si fallas" }, { id: 259, cat: "TRIVIA RÁPIDA", title: "Cocina", text: "¿De qué país es la pizza? (Respuesta: Italia)", drink: "Bebe 1 Trago si fallas" }, { id: 260, cat: "TRIVIA RÁPIDA", title: "El Idioma", text: "¿Qué idioma se habla en Brasil? (Respuesta: Portugués)", drink: "Bebe 1 Trago si fallas" }, { id: 261, cat: "TRIVIA RÁPIDA", title: "Cine", text: "¿Cómo se llama el perro de Tintín? (Respuesta: Milú)", drink: "Bebe 2 Tragos si fallas" }, { id: 262, cat: "TRIVIA RÁPIDA", title: "El Monumento", text: "¿Dónde se encuentra el Coliseo Romano? (Respuesta: Roma, Italia)", drink: "Bebe 1 Trago si fallas" }, { id: 263, cat: "TRIVIA RÁPIDA", title: "El Inventor", text: "¿Quién formuló la Teoría de la Relatividad? (Respuesta: Albert Einstein)", drink: "Bebe 3 Tragos si fallas" }, { id: 264, cat: "TRIVIA RÁPIDA", title: "Deporte", text: "¿Qué deporte se juega en Wimbledon? (Respuesta: Tenis)", drink: "Bebe 1 Trago si fallas" }, { id: 265, cat: "TRIVIA RÁPIDA", title: "El Continente", text: "Nombra el único continente que es también un país. (Respuesta: Australia/Oceanía)", drink: "Bebe 2 Tragos si fallas" }, { id: 266, cat: "TRIVIA RÁPIDA", title: "El Periodo", text: "¿Qué periodo vino antes del Período Jurásico? (Respuesta: Triásico)", drink: "Bebe 3 Tragos si fallas" }, { id: 267, cat: "TRIVIA RÁPIDA", title: "El Elemento", text: "¿Qué metal es líquido a temperatura ambiente? (Respuesta: Mercurio)", drink: "Bebe 2 Tragos si fallas" }, { id: 268, cat: "TRIVIA RÁPIDA", title: "La Estatua", text: "¿En qué ciudad se encuentra la Estatua de la Libertad? (Respuesta: Nueva York)", drink: "Bebe 1 Trago si fallas" }, { id: 269, cat: "TRIVIA RÁPIDA", title: "El Escritor", text: '¿Quién escribió la novela "Cien años de soledad"? (Respuesta: Gabriel García Márquez)', drink: "Bebe 3 Tragos si fallas" }, { id: 270, cat: "TRIVIA RÁPIDA", title: "El Músico", text: "Nombra el instrumento que tocaba Mozart. (Respuesta: Piano/Clavecín)", drink: "Bebe 2 Tragos si fallas" }, { id: 271, cat: "CADENA", title: "La Categoría", text: "El jugador que saca la carta dice una categoría (ej. Frutas). El siguiente nombra un elemento de esa categoría.", drink: "El primero en repetir o tardar más de 5 segundos, bebe 2 Tragos" }, { id: 272, cat: "CADENA", title: "Asociación Musical", text: "El jugador que saca la carta nombra un artista. El siguiente debe nombrar un artista que empiece con la última letra del artista anterior.", drink: "El primero en tardar más de 5 segundos o repetir, bebe 2 Tragos" }, { id: 273, cat: "CADENA", title: "La Historia Colectiva", text: "Jugador 1 dice 4 palabras para empezar una historia. Cada jugador añade 4 palabras.", drink: "El primero en repetir o crear una frase incoherente, bebe 3 Tragos" }, { id: 274, cat: "CADENA", title: "¡Al Revés!", text: "El jugador dice una palabra (de 5+ letras). El siguiente debe deletrearla al revés.", drink: "El primero en equivocarse bebe 2 Tragos" }, { id: 275, cat: "CADENA", title: "El Nombre y el Apodo", text: "Jugador 1 dice su nombre y un apodo. El siguiente repite los nombres y apodos anteriores y añade el suyo.", drink: "El primero en fallar la secuencia bebe 3 Tragos" }, { id: 276, cat: "CADENA", title: "Tres de Todo", text: "Nombra 3 marcas de coche. El siguiente nombra 3 animales. Continúa con 3 películas, 3 ciudades, 3 bebidas...", drink: "El primero en no poder nombrar 3 de la categoría, bebe 2 Tragos" }, { id: 277, cat: "CADENA", title: "El Detective", text: "El jugador piensa en una persona (famosa o del grupo). Los demás hacen preguntas de sí/no. El jugador que adivina elige a quién bebe.", drink: "Si el jugador se rinde o falla una respuesta, bebe 3 Tragos" }, { id: 278, cat: "CADENA", title: "El Color Múltiple", text: "El jugador dice un color y un objeto de ese color. El siguiente repite y añade su color/objeto.", drink: "El primero en fallar la secuencia bebe 3 Tragos" }, { id: 279, cat: "CADENA", title: "Nombres de Bebidas", text: "Jugador 1 nombra una bebida. El siguiente repite y añade una nueva.", drink: "El primero en fallar la secuencia bebe 2 Tragos" }, { id: 280, cat: "CADENA", title: "Canciones con Nombre", text: 'Nombra una canción que tenga un nombre de persona en el título (ej. "Billie Jean").', drink: "El primero en repetir o fallar, bebe 3 Tragos" }, { id: 281, cat: "CADENA", title: "De la A a la Z", text: "Nombra una palabra que empiece con la A. El siguiente con la B. Continúa en orden alfabético.", drink: "El primero en fallar la letra, bebe 2 Tragos" }, { id: 282, cat: "CADENA", title: "La Frase Colectiva", text: "Jugador 1 dice una palabra. Jugador 2 añade una palabra para formar una frase coherente.", drink: "El que rompa la coherencia de la frase bebe 2 Tragos" }, { id: 283, cat: "CADENA", title: "El Superhéroe", text: "Jugador 1 nombra un superhéroe. El siguiente nombra un superhéroe cuya primera letra sea la última del anterior.", drink: "El primero en tardar más de 5 segundos, bebe 3 Tragos" }, { id: 284, cat: "CADENA", title: "Nombres de Actores", text: "Jugador 1 nombra un actor. El siguiente nombra una película que haya hecho el actor anterior.", drink: "El primero en fallar la película/actor, bebe 2 Tragos" }, { id: 285, cat: "CADENA", title: "¿Quién Soy Yo?", text: 'El jugador piensa en un objeto de la sala. Los demás preguntan con "Sí" o "No" para adivinar.', drink: "Si adivinan, el jugador bebe 2 Tragos" }, { id: 286, cat: "CADENA", title: "Animales de Dos Patas", text: "Jugador 1 nombra un animal de dos patas. El siguiente nombra uno de cuatro, luego de seis, y vuelve a empezar.", drink: "El que no pueda nombrar uno de la categoría, bebe 3 Tragos" }, { id: 287, cat: "CADENA", title: "El Throwback", text: "Jugador 1 nombra algo de los años 90. El siguiente nombra algo de los 2000. Continúa con los 2010.", drink: "El que falle la secuencia temporal, bebe 2 Tragos" }, { id: 288, cat: "CADENA", title: "Nombres de Marcas", text: "Jugador 1 nombra una marca de zapatos. El siguiente nombra una marca de coche, y luego de comida.", drink: "El que no pueda nombrar una marca, bebe 2 Tragos" }, { id: 289, cat: "CADENA", title: "Nombres y Apellidos", text: "Jugador 1 dice un nombre y un apellido. El siguiente dice un nombre cuyo apellido empiece con la última letra del anterior.", drink: "El primero en fallar, bebe 3 Tragos" }, { id: 290, cat: "CADENA", title: "Países con I", text: "Nombra un país que contenga la letra 'I'. El siguiente, repite y añade otro.", drink: "El que falle la secuencia, bebe 2 Tragos" }, { id: 291, cat: "CADENA", title: "El Viaje en Avión", text: '"Voy en un avión y llevo..." El jugador 1 lleva algo. El 2 repite y añade algo que empiece con la misma letra.', drink: "El que falle la secuencia o la letra, bebe 3 Tragos" }, { id: 292, cat: "CADENA", title: "¡Palabra Prohibida!", text: 'Piensen en una palabra que nadie puede decir (ej. el nombre de un jugador, "botella").', drink: "El que diga la palabra prohibida, bebe 3 Tragos" }, { id: 293, cat: "CADENA", title: "El Recuento", text: "Jugador 1 dice el número de dedos de su mano. Jugador 2 repite el número y añade una parte del cuerpo más (ej. 2 orejas).", drink: "El primero en equivocarse o repetir, bebe 3 Tragos" }, { id: 294, cat: "CADENA", title: "El Viaje al Mercado", text: '"Voy al mercado y compro..." El jugador 1 compra algo. El 2 repite y añade.', drink: "El que falle la secuencia de objetos, bebe 2 Tragos" }, { id: 295, cat: "CADENA", title: "Personajes Ficticios", text: "Nombra un personaje de la serie/película que haya dicho el jugador anterior.", drink: "El primero en no poder nombrar uno, bebe 3 Tragos" }, { id: 296, cat: "CADENA", title: "La Cadena de Colores", text: "Jugador 1 dice un color. El siguiente dice el nombre de alguien que lleve ese color (del grupo o famoso).", drink: "El primero en no poder nombrar a alguien, bebe 2 Tragos" }, { id: 297, cat: "CADENA", title: "Los 7 Pecados", text: "Nombra los 7 pecados capitales de forma secuencial.", drink: "El primero en fallar la lista, bebe 3 Tragos" }, { id: 298, cat: "CADENA", title: "La Sopa de Letras", text: "Elige una palabra (ej. RISA). Cada jugador dice una palabra que contenga las letras R, I, S o A.", drink: "El que no pueda decir una palabra válida, bebe 2 Tragos" }, { id: 299, cat         // --- State Management ---
        async function casUpdateRoom(code, payloadOrBuilder, knownLastActivity = null) {
            if (!window.supabaseClient) return { error: 'no supabase' };
            // Retry with exponential backoff
            const maxAttempts = 3;
            let attempt = 0;
            while (attempt < maxAttempts) {
                try {
                    let payload = payloadOrBuilder;
                    if (typeof payloadOrBuilder === 'function') {
                        const rowRes = await window.supabaseClient.from('rooms').select('game_state, last_activity').eq('code', code).single();
                        const row = rowRes.data || {};
                        payload = payloadOrBuilder(row);
                        if (payload === null) return { skipped: true };
                    }

                    const newLast = new Date().toISOString();
                    payload.last_activity = newLast;

                    let res;
                    if (knownLastActivity) {
                        res = await window.supabaseClient.from('rooms').update(payload).eq('code', code).eq('last_activity', knownLastActivity);
                        if (res.error) {
                            console.warn('casUpdateRoom CAS failed, fallback', res.error);
                            res = await window.supabaseClient.from('rooms').update(payload).eq('code', code);
                        }
                    } else {
                        const rowRes = await window.supabaseClient.from('rooms').select('last_activity').eq('code', code).single();
                        const last = rowRes.data ? rowRes.data.last_activity : null;
                        if (last) {
                            res = await window.supabaseClient.from('rooms').update(payload).eq('code', code).eq('last_activity', last);
                            if (res.error) {
                                console.warn('casUpdateRoom CAS failed, fallback', res.error);
                                res = await window.supabaseClient.from('rooms').update(payload).eq('code', code);
                            }
                        } else {
                            res = await window.supabaseClient.from('rooms').update(payload).eq('code', code);
                        }
                    }

                    // If no error return result
                    if (!res || !res.error) return res;
                    // otherwise throw to retry
                    throw res.error;
                } catch (e) {
                    attempt++;
                    const backoff = 150 * Math.pow(2, attempt); // 300,600,1200ms
                    console.warn('casUpdateRoom attempt', attempt, 'failed', e, 'backoff', backoff);
                    if (attempt >= maxAttempts) return { error: e };
                    await new Promise(r => setTimeout(r, backoff));
                }
            }
            return { error: 'max attempts reached' };
        }

        function handleTouchStart(e) {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }

        function handleTouchEnd(e) {
            touchEndX = e.changedTouches[0].screenX;
            touchEndY = e.changedTouches[0].screenY;
            handleSwipe();
        }

        function handleSwipe() {
            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;

            // Solo procesar swipes horizontales significativos
            if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > minSwipeDistance) {
                if (diffX > 0) {
                    // Swipe right - navegación contextual
                    onSwipeRight();
                } else {
                    // Swipe left - siguiente carta
                    onSwipeLeft();
                }
            }
        }

                    }
                } else {
                    const rowRes = await window.supabaseClient.from('rooms').select('last_activity').eq('code', code).single();
                    const last = rowRes.data ? rowRes.data.last_activity : null;
                    if (last) {
                        res = await window.supabaseClient.from('rooms').update(payload).eq('code', code).eq('last_activity', last);
                        if (res.error) {
                            console.warn('casUpdateRoom CAS failed, fallback', res.error);
                            res = await window.supabaseClient.from('rooms').update(payload).eq('code', code);
                        }
                    } else {
                        res = await window.supabaseClient.from('rooms').update(payload).eq('code', code);
                    }
                }
                return res;
            } catch (e) {
                console.warn('casUpdateRoom error', e);
                return { error: e };
            }
        }

        function getLocalPlayerName() {
            return localStorage.getItem('localPlayerName') || (state.user && state.user.user_metadata && state.user.user_metadata.game_nickname) || null;
        }

        function isLocalPlayerTurn() {
            try {
                const localName = getLocalPlayerName();
                if (!localName || !state.players || state.players.length === 0) return false;
                const idx = state.currentPlayerIndex ?? 0;
                return String(state.players[idx]?.name || '').trim() === String(localName).trim();
            } catch (e) { return false; }
        }

        // --- Turn lock using Supabase ---
        async function acquireTurnLock(timeoutMs = 30000) {
            const localName = getLocalPlayerName();
            if (!localName || !state.roomCode || !supabaseClient) return false;
            try {
                // Read current room, include last_activity for CAS
                const { data: row, error } = await supabaseClient.from('rooms').select('game_state, last_activity').eq('code', state.roomCode).single();
                if (error || !row) return false;
                const gs = row.game_state || {};
                const currentLock = gs.full_state?.turnLock || gs.turnLock;
                const now = Date.now();
                if (currentLock && currentLock.expiresAt && new Date(currentLock.expiresAt).getTime() > now) {
                    if (String(currentLock.owner) === String(localName)) return true; // already ours
                    return false; // someone else holds active lock
                }

                const lock = { owner: localName, expiresAt: new Date(now + timeoutMs).toISOString() };
                const newFull = { ...(gs.full_state || {}), turnLock: lock };
                const newGameState = { ...gs, full_state: newFull };

                // Attempt CAS update using helper
                const res = await casUpdateRoom(state.roomCode, { game_state: newGameState }, row.last_activity);

                // If update succeeded (rows returned), claim succeeded
                if (res && !res.error && !(res.skipped)) {
                    if (!state.full_state) state.full_state = {};
                    state.full_state.turnLock = lock;
                    saveState(true);
                    return true;
                }

                return false;
            } catch (e) {
                console.warn('acquireTurnLock exc', e);
                return false;
            }
        }

        async function releaseTurnLock() {
            const localName = getLocalPlayerName();
            if (!localName || !state.roomCode || !supabaseClient) return;
            try {
                const { data: row, error } = await supabaseClient.from('rooms').select('game_state, last_activity').eq('code', state.roomCode).single();
                if (error || !row) return;
                const gs = row.game_state || {};
                const currentLock = gs.full_state?.turnLock || gs.turnLock;
                if (!currentLock) return;
                if (String(currentLock.owner) !== String(localName)) return; // only owner can release

                const newFull = { ...(gs.full_state || {}) };
                delete newFull.turnLock;
                const newGameState = { ...gs, full_state: newFull };
                const newLastActivity = new Date().toISOString();

                await casUpdateRoom(state.roomCode, { game_state: newGameState }, row.last_activity);

                if (state.full_state) delete state.full_state.turnLock;
                saveState(true);
            } catch (e) { console.warn('releaseTurnLock', e); }
        }

        function updateTurnLockIndicator() {
            try {
                const el = document.getElementById('turnLockIndicator');
                const nameEl = document.getElementById('turnLockOwner');
                const owner = state.full_state?.turnLock?.owner || state.turnLock?.owner || null;
                if (owner) {
                    nameEl.innerText = owner;
                    el.style.display = 'block';
                } else {
                    el.style.display = 'none';
                }
            } catch (e) { /* ignore */ }
        }

        // Wrapper that acquires lock, runs action, and releases it
        async function withTurnLock(actionFn) {
            if (!state.roomCode || !supabaseClient) {
                // offline mode -> enforce local turn only
                if (!isLocalPlayerTurn()) { showToast('⚠️ No es tu turno'); vibrate(100); return; }
                actionFn();
                return;
            }
            const got = await acquireTurnLock(20000);
            if (!got) { showToast('🔒 Turno ocupado'); vibrate(120); return; }
            try {
                actionFn();
            } finally {
                // small delay to ensure state propagated
                setTimeout(() => releaseTurnLock(), 500);
            }
        }

                } else {

        function evaluarMision(cumplio) {
            if (!state.misionesTerminadas || state.misionesTerminadas.length === 0) return;

            if (cumplio) {

        function drawSinExcusasCard() {
            // Use lock for multiplayer
            if (state.roomCode) {
                withTurnLock(() => internalDrawSinExcusas());
                return;
            }
            internalDrawSinExcusas();

            function internalDrawSinExcusas() {
                // Manejo de misiones activas (decrementar turnos)
                if (state.misiones && state.misiones.length > 0) {
                    state.misiones.forEach(m => m.turnos--);
                    const terminadas = state.misiones.filter(m => m.turnos <= 0);
                    state.misiones = state.misiones.filter(m => m.turnos > 0);
                    
                    if (terminadas.length > 0) {
                        if (!state.misionesTerminadas) state.misionesTerminadas = [];
                        state.misionesTerminadas.push(...terminadas);
                    }
                }

                // record drawer index
                const drawerIdx = state.currentPlayerIndex || 0;

                state.sinexcusas.index++;
                if (state.sinexcusas.index >= state.sinexcusas.deck.length) {
                    resetSinExcusasDeck();
                    state.sinexcusas.index = 0;
                    showToast('🔄 Mazo mezclado de nuevo');
                }
                state.sinexcusas.animationClass = 'card-enter';

                // Save last card for drawer
                try {
                    const currentCard = state.sinexcusas.deck[state.sinexcusas.index];
                    const drawer = state.players[drawerIdx];
                    if (drawer && currentCard) {
                        if (!state.playerLast) state.playerLast = {};
                        if (!state.playerLast[drawer.name]) state.playerLast[drawer.name] = {};
                        state.playerLast[drawer.name].sinexcusas = String(currentCard.id);
                    }
                } catch (e) { console.warn('save last sinexcusas', e); }

                // If the new card is a mission, add it (assign to drawer)
                const currentCard2 = state.sinexcusas.deck[state.sinexcusas.index];
                if (currentCard2 && currentCard2.cat === 'mision_oculta') {
                    const match = (currentCard2.body || currentCard2.text || '').match(/(\d+)\s+turnos?/i);
                    const turnos = match ? parseInt(match[1]) : 3;
                    if (!state.misiones) state.misiones = [];
                    state.misiones.push({
                        jugador: state.players[drawerIdx].name,
                        texto: currentCard2.body || currentCard2.text,
                        turnos: turnos,
                        idCarta: currentCard2.id
                    });
                }

                state.currentPlayerIndex = (state.currentPlayerIndex + 1) % state.players.length;
                saveState();
                render();
            }
        }
